services:
  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: pumai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pumai}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: ${POSTGRES_DB:-pumai_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pumai} -d ${POSTGRES_DB:-pumai_db}"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: pumai-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD required}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  # ─── Next.js App ───
  app:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pumai-app
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pumai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pumai_db}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      AUTH_SECRET: "${AUTH_SECRET:?AUTH_SECRET is required}"
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_APP_SECRET_IG: ${META_APP_SECRET_IG:-}
      META_WEBHOOK_VERIFY_TOKEN: "${META_WEBHOOK_VERIFY_TOKEN:?META_WEBHOOK_VERIFY_TOKEN required}"
      WHATSAPP_WEBHOOK_TOKEN: ${WHATSAPP_WEBHOOK_TOKEN:-}
      CHANNEL_CRED_KEY: ${CHANNEL_CRED_KEY:-}
      UPLOAD_SIGNING_KEY: ${UPLOAD_SIGNING_KEY:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3002}
      AUTH_URL: ${AUTH_URL:-http://localhost:3002}
      AUTH_TRUST_HOST: "true"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_WEBCHAT_STARTER: ${STRIPE_PRICE_WEBCHAT_STARTER:-}
      STRIPE_PRICE_WEBCHAT_GROWTH: ${STRIPE_PRICE_WEBCHAT_GROWTH:-}
      STRIPE_PRICE_WEBCHAT_ENTERPRISE: ${STRIPE_PRICE_WEBCHAT_ENTERPRISE:-}
      STRIPE_PRICE_WA_STARTER: ${STRIPE_PRICE_WA_STARTER:-}
      STRIPE_PRICE_WA_GROWTH: ${STRIPE_PRICE_WA_GROWTH:-}
      STRIPE_PRICE_WA_ENTERPRISE: ${STRIPE_PRICE_WA_ENTERPRISE:-}
      STRIPE_PRICE_IG_STARTER: ${STRIPE_PRICE_IG_STARTER:-}
      STRIPE_PRICE_IG_GROWTH: ${STRIPE_PRICE_IG_GROWTH:-}
      STRIPE_PRICE_IG_ENTERPRISE: ${STRIPE_PRICE_IG_ENTERPRISE:-}
      STRIPE_PRICE_MSG_STARTER: ${STRIPE_PRICE_MSG_STARTER:-}
      STRIPE_PRICE_MSG_GROWTH: ${STRIPE_PRICE_MSG_GROWTH:-}
      STRIPE_PRICE_MSG_ENTERPRISE: ${STRIPE_PRICE_MSG_ENTERPRISE:-}
      STRIPE_PRICE_WEBCHAT_ADDON: ${STRIPE_PRICE_WEBCHAT_ADDON:-}
      STRIPE_PRICE_WA_ADDON: ${STRIPE_PRICE_WA_ADDON:-}
      STRIPE_PRICE_IG_ADDON: ${STRIPE_PRICE_IG_ADDON:-}
      STRIPE_PRICE_MSG_ADDON: ${STRIPE_PRICE_MSG_ADDON:-}
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
