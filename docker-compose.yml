services:
  postgres:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    container_name: pumai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pumai}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: ${POSTGRES_DB:-pumai_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pumai} -d ${POSTGRES_DB:-pumai_db}"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
    container_name: pumai-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  app:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: pumai-app
    restart: unless-stopped
    ports:
      - "3002:3000"
      - "127.0.0.1:5555:5555"  # Prisma Studio (loopback only — use: docker compose exec app npm run db:studio)
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pumai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pumai_db}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3002}
      AUTH_URL: ${AUTH_URL:-http://localhost:3002}
      AUTH_TRUST_HOST: "true"
      UPLOADS_DIR: /app/uploads
      RUN_SEED: "1"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
